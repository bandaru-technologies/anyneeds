spring:
  application:
    name: salepe
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/anyneeds}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: ${PORT:8080}

anyneeds:
  jwt:
    secret: ${JWT_SECRET:anyneeds-secret-key-change-in-production-must-be-256-bits-long-enough}
    expiration-ms: 604800000
  otp:
    expiry-minutes: 10
    length: 6
  upload-dir: ${UPLOAD_DIR:./uploads}
  base-url: ${BASE_URL:http://localhost:8080}
